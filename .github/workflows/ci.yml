name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: sdks/python/pyproject.toml

      - name: Install dependencies
        run: |
          npm ci
          python -m pip install -e "./sdks/python[dev,fastapi]"

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Verify JavaScript and Python packages
        run: npm run verify
